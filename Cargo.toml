[package]
name = "gtiot"
description = "GTIOT: High-Fidelity Edge Fusion and Action-Collapse Framework [RFC-005]"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage = "http://gtiot.com"
documentation = "https://github.com/Aicent-Stack/manifesto/blob/main/rfcs/RFC-005-GTIOT-BODY.md"
keywords = ["robotics", "embodied-ai", "rfc-005", "action-collapse", "proprioception", "128-bit-atomic"]
categories = ["embedded", "hardware-support", "no-std", "science"]
rust-version = "1.75"

[dependencies]
# --- Core Organism Linking (The Reflex Arc) ---
# The Body is physically gated by Immunity (RPKI) and Blood (ZCMK) via Nerves (RTTP)
rttp = { workspace = true }
rpki = { workspace = true }
zcmk = { workspace = true }

# --- Hard Real-Time & Physical Execution ---
# [RFC-005] Embassy executor for sub-millisecond control loops (1200 Hz)
embassy-executor = { workspace = true }
embassy-time     = { workspace = true }

# --- Kinetic Primitives & Mathematics ---
# [PHYSICS] Linear algebra for 12-DOF kinematics and motor torque vectors
nalgebra = { version = "0.32", default-features = false, features = ["libm"] }
# [PERF] Zero-allocation storage for high-frequency motor trajectories
smallvec = { workspace = true, features = ["serde"] }

# --- Logic, State & Telemetry ---
serde     = { workspace = true, features = ["derive"] }
anyhow    = { workspace = true }
tracing   = { workspace = true } # High-fidelity proprioceptive telemetry
once_cell = { workspace = true } # Global state manifold initialization
tokio     = { workspace = true, features = ["sync", "rt"] } # Simulation bridge

[dev-dependencies]
# Benchmarking for the 200µs Action-Collapse performance target
criterion = { workspace = true }
