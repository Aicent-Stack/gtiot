[package]
name = "gtiot"
description = "GTIOT: High-Fidelity Edge Fusion and Action-Collapse Framework [RFC-005]"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository = "https://github.com/Aicent-Stack/gtiot" # Points to its own independent repository
homepage = "http://gtiot.com"
documentation = "https://github.com/Aicent-Stack/manifesto/blob/main/rfcs/RFC-005-GTIOT-BODY.md"
keywords = ["robotics", "embodied-ai", "rfc-005", "action-collapse", "proprioception", "128-bit-atomic"]
categories = ["embedded", "hardware-support", "no-std", "science"]
rust-version.workspace = true # Explicitly inherit rust-version for consistency

[dependencies]
# --- Core Organism Linking (Unidirectional Dependency Flow) ---
# The Body reacts to Nerves (RTTP) and requires Immunity (RPKI) and Blood (ZCMK)
rttp = { workspace = true }
rpki = { workspace = true }
zcmk = { workspace = true }

# --- Hard Real-Time & Embedded Execution ---
# [RFC-005] Embassy executor for sub-millisecond control loops (1200 Hz)
embassy-executor = { workspace = true }
embassy-time     = { workspace = true }

# --- Kinetic Primitives & Mathematics ---
# [PHYSICS] Linear algebra for 12-DOF kinematics and motor torque vectors
nalgebra = { workspace = true }
# [PERF] Zero-allocation storage for high-frequency motor trajectories
smallvec = { workspace = true }

# --- Logic, State & Telemetry ---
serde     = { workspace = true, features = ["derive"] }
anyhow    = { workspace = true }
tracing   = { workspace = true } # High-fidelity proprioceptive telemetry
once_cell = { workspace = true } # Global state manifold initialization
tokio     = { workspace = true } # Simulation bridge

[features]
default = ["std"]
# [Standard v1.0] Standard library support for high-end edge compute nodes.
# Explicitly re-exporting 'std' for internal Aicent Stack dependencies to avoid cyclic feature conflicts.
std = [
    "rttp/std", 
    "rpki/std", 
    "zcmk/std"
]

# [RFC-005] Bare-metal support for industrial robotics (MCUs/NPUs)
no_std = ["nalgebra/libm"]

[dev-dependencies]
# Benchmarking for the 200µs Action-Collapse performance target
criterion = { workspace = true }
